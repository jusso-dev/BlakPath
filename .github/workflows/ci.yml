name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  # ---------------------------------------------------------------------------
  # Static checks: typecheck, lint, formatting. Fast, no services required.
  # ---------------------------------------------------------------------------
  static:
    name: Typecheck, lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  # ---------------------------------------------------------------------------
  # Unit + integration tests. Integration tests get real Postgres + Redis.
  # ---------------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blakpath
          POSTGRES_PASSWORD: blakpath
          POSTGRES_DB: blakpath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blakpath -d blakpath_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://blakpath:blakpath@localhost:5432/blakpath_test
      REDIS_URL: redis://localhost:6379
      # Test-only secrets — never real. Satisfy env validation at import time.
      BETTER_AUTH_SECRET: ci-test-secret-value-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      ENCRYPTION_MASTER_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtMTIzNDU=
      ENCRYPTION_KEY_VERSION: '1'
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test-secret
      CLAMAV_HOST: localhost
      SMTP_HOST: localhost
      RUN_INTEGRATION: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed development bootstrap
        run: pnpm db:seed

      - name: Run tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Production build. Ensures the Next.js standalone output compiles.
  # ---------------------------------------------------------------------------
  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [static]
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      # Build-time env only; no real secrets. The app validates env lazily.
      DATABASE_URL: postgres://blakpath:blakpath@localhost:5432/blakpath
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-build-secret-value-at-least-32-characters-long
      ENCRYPTION_MASTER_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtMTIzNDU=
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test-secret
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  e2e:
    name: Browser and accessibility acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blakpath
          POSTGRES_PASSWORD: blakpath
          POSTGRES_DB: blakpath_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U blakpath -d blakpath_e2e"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      NODE_ENV: development
      DATABASE_URL: postgres://blakpath:blakpath@localhost:5432/blakpath_e2e
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-e2e-secret-value-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      ENCRYPTION_MASTER_KEY: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtMTIzNDU=
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test-secret
      CLAMAV_HOST: localhost
      SMTP_HOST: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:migrate && pnpm db:seed
      - run: pnpm test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
