name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed CVEs surface even without a push.
    - cron: '0 17 * * 1' # Mondays 03:00 ap-southeast-2 (UTC+10)

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.12.0'

jobs:
  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan: pnpm audit + OSV Scanner.
  # ---------------------------------------------------------------------------
  dependencies:
    name: Dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Blocking gate: fail the build on any high/critical advisory in the
      # PRODUCTION dependency tree. Advisories that are justified-ignored live in
      # package.json `pnpm.auditConfig.ignoreGhsas` (currently GHSA-q7rr-3cgh-j5r3
      # — an OpenTelemetry Prometheus-exporter crash; BlakPath ships only the
      # OTLP/HTTP exporter, so the vulnerable path is never loaded).
      - name: pnpm audit (fail on high/critical)
        run: pnpm audit --prod --audit-level high

      # Informational depth scan. OSV does not honour pnpm's ignore list and
      # also reports moderate advisories, so it is non-blocking — pnpm audit
      # above is the gate. Surfaced in the job log for triage.
      - name: OSV Scanner (informational)
        continue-on-error: true
        uses: google/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --recursive
            ./

  # ---------------------------------------------------------------------------
  # Secret scanning with Gitleaks.
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pinned Gitleaks release. Run the CLI directly rather than
      # gitleaks/gitleaks-action, which requires a paid GITLEAKS_LICENSE for
      # organisation-owned repositories — the CLI has no such gate.
      GITLEAKS_VERSION: '8.21.2'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can scan past commits.
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks (scan full history, fail on any finding)
        run: gitleaks detect --source . --redact --no-banner --verbose --exit-code 1

  # ---------------------------------------------------------------------------
  # Container image scan (Trivy) + SBOM generation (Syft).
  # ---------------------------------------------------------------------------
  container:
    name: Container scan & SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (runner target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false
          load: true
          tags: blakpath:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: blakpath:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy scan (gate — fail on CRITICAL,HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: blakpath:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (Syft, SPDX JSON)
        uses: anchore/sbom-action@v0.17.7
        with:
          image: blakpath:ci
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          retention-days: 90
